name: Main Source Branch Guard

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  main-source-branch:
    name: main-source-branch
    runs-on: ubuntu-latest

    steps:
      - name: Validate source branch
        run: |
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "PRs to main must come from develop. Current source: ${{ github.head_ref }}"
            exit 1
          fi
